name: IRONBID CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── LINT & TYPE CHECK ────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  # ─── ROUTE GUARD + SMOKE ─────────────
  smoke:
    name: Route Guard & Smoke Flow
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Validate nav routes
        run: npm run guard:routes

      - name: Start app in mock mode
        run: npm run dev -- -p 3014 > /tmp/next.log 2>&1 &
        env:
          DEV_MOCK_MODE: 'true'
          DEV_AUTH_BYPASS: 'true'

      - name: Wait for app
        run: node scripts/wait-for-url.mjs http://127.0.0.1:3014 120000

      - name: Run mock smoke flow
        run: npm run smoke:mock-flow -- --base-url=http://127.0.0.1:3014
        env:
          DEV_MOCK_MODE: 'true'
          DEV_AUTH_BYPASS: 'true'

      - name: Dump Next log on failure
        if: failure()
        run: cat /tmp/next.log

  # ─── BUILD ───────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_ABLY_CLIENT_KEY: ${{ secrets.NEXT_PUBLIC_ABLY_CLIENT_KEY }}

  # Production releases are handled in .github/workflows/release.yml
